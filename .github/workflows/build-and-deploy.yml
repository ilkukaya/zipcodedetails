name: Build and Deploy zipcodedetails.com

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 15 1 *'  # Every year on January 15 at 06:00 UTC

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # ── Python data pipeline ──────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Census Gazetteer data
        run: python scripts/01_download_census.py

      - name: Download city/county/state mapping data
        run: python scripts/02_download_usps.py

      - name: Merge and enrich data
        run: python scripts/03_merge_and_enrich.py

      - name: Generate individual ZIP JSON files
        run: python scripts/04_generate_json.py

      - name: Generate index files
        run: python scripts/05_generate_indexes.py

      - name: Validate generated data
        run: python scripts/06_validate.py

      - name: Verify data files
        run: |
          ZIP_COUNT=$(ls data/zips/*.json 2>/dev/null | wc -l)
          echo "Generated $ZIP_COUNT ZIP JSON files"
          if [ "$ZIP_COUNT" -lt 100 ]; then
            echo "ERROR: Expected 30000+ ZIP files but only found $ZIP_COUNT"
            exit 1
          fi
          echo "state_index.json: $(wc -c < data/state_index.json) bytes"
          echo "city_index.json: $(wc -c < data/city_index.json) bytes"

      # ── Node.js build ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not found after build"
            exit 1
          fi
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          echo "Built $PAGE_COUNT HTML pages in dist/"

      # ── Deploy to Netlify ─────────────────────────────────────
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy --prod --dir=dist --message "Deploy from GitHub Actions (commit ${GITHUB_SHA::7})"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
