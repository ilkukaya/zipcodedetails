name: Build and Deploy zipcodedetails.com

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 15 1 *'  # Every year on January 15 at 06:00 UTC

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # ── Python data pipeline ──────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download raw data from GitHub Release
        run: |
          mkdir -p data/raw
          # NOTE: Set DATA_RELEASE_URL secret to the GitHub Release asset URL
          # for pseo_zipcodes_full.json (or a .rar archive of it).
          if [ -n "${{ secrets.DATA_RELEASE_URL }}" ]; then
            echo "Downloading data from release..."
            curl -fsSL "${{ secrets.DATA_RELEASE_URL }}" -o data/raw/pseo_zipcodes_full.json
            echo "Downloaded $(wc -c < data/raw/pseo_zipcodes_full.json) bytes"
          else
            echo "WARNING: DATA_RELEASE_URL secret not set. Skipping download."
            echo "The build will fail unless data/raw/pseo_zipcodes_full.json already exists."
          fi

      - name: Run data pipeline
        run: python3 scripts/build_data.py

      - name: Verify data files
        run: |
          ZIP_COUNT=$(ls data/zips/*.json 2>/dev/null | wc -l)
          echo "Generated $ZIP_COUNT ZIP JSON files"
          if [ "$ZIP_COUNT" -lt 35000 ]; then
            echo "ERROR: Expected 35000+ ZIP files but only found $ZIP_COUNT"
            exit 1
          fi
          echo "state_index.json: $(wc -c < data/state_index.json) bytes"
          echo "city_index.json:  $(wc -c < data/city_index.json) bytes"
          echo "county_index.json: $(wc -c < data/county_index.json) bytes"

      # ── Node.js build ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not found after build"
            exit 1
          fi
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          echo "Built $PAGE_COUNT HTML pages in dist/"
          if [ "$PAGE_COUNT" -lt 35000 ]; then
            echo "WARNING: Expected 35000+ pages but found $PAGE_COUNT"
          fi

      # ── Deploy to Netlify ─────────────────────────────────────
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy --prod --dir=dist --message "Deploy from GitHub Actions (commit ${GITHUB_SHA::7})"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
