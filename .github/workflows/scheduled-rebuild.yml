name: Scheduled Annual Rebuild

on:
  schedule:
    - cron: '0 6 15 1 *'  # January 15, 06:00 UTC

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main build workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('Triggered annual rebuild of zipcodedetails.com');
