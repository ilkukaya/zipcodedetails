[build]
  # ALL builds and deploys are handled by GitHub Actions.
  # Netlify should NEVER build on its own — it would deploy with empty data.
  # The ignore command exits 0 to cancel any auto-triggered builds.
  ignore = "exit 0"
  command = "echo 'This site is deployed via GitHub Actions only' && exit 0"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# URL redirects for common variations
[[redirects]]
  from = "/zipcode/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/zip-code/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/postal-code/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/states/*"
  to = "/state/:splat"
  status = 301

[[redirects]]
  from = "/cities/*"
  to = "/city/:splat"
  status = 301

# Trailing slash normalization
[[redirects]]
  from = "/zip/:code/"
  to = "/zip/:code"
  status = 301

[[redirects]]
  from = "/state/:state/"
  to = "/state/:state"
  status = 301

[[redirects]]
  from = "/city/:slug/"
  to = "/city/:slug"
  status = 301

# Sitemap redirect
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
