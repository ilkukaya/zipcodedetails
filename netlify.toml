[build]
  # ALL builds and deploys are handled by GitHub Actions.
  # Netlify should NEVER build on its own — it would deploy with empty data.
  # The ignore command exits 0 to cancel any auto-triggered builds.
  ignore = "exit 0"
  command = "echo 'This site is deployed via GitHub Actions only' && exit 0"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SITE_URL = "https://zipcodedetails.netlify.app"

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://partner.googleadservices.com https://tpc.googlesyndication.com https://www.googletagservices.com https://plausible.io https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdn.jsdelivr.net https://pagead2.googlesyndication.com; connect-src 'self' https://plausible.io; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# URL redirects for common variations
[[redirects]]
  from = "/zipcode/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/zip-code/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/postal-code/*"
  to = "/zip/:splat"
  status = 301

[[redirects]]
  from = "/states/*"
  to = "/state/:splat"
  status = 301

[[redirects]]
  from = "/cities/*"
  to = "/city/:splat"
  status = 301

# Sitemap redirect
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301

# 404 fallback — must be last
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
